services:
  - type: web
    name: calendar-availability-proxy
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: ICLOUD_EMAIL
        sync: false
      - key: ICLOUD_APP_PASSWORD
        sync: false
      - key: CALENDAR_ID
        sync: false
      - key: CACHE_TTL_SECONDS
        value: "120"
      - key: RATE_PER_SECOND
        value: "0.5"
      - key: RATE_BURST
        value: "8"
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
